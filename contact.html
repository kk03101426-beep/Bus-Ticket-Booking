<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="Sundara.png" type="image/x-icon">
</head>
<body>
    <header>
        <div class="logo">
            <img src="Sundara.png" class="site-logo">
            <h1>Sundhara Bus Ticket Booking</h1>
        </div>
        <nav>
        <ul>
            <li><a href="index.html">HOME</a></li>
            <li><a href="index.html">BOOK TICKET</a></li>
            <li><a href="contact.html">CONTACT</a></li>
        </ul>
        </nav>
    </header>

    <main>
        <section class="contact">
            <h2>Contact Us</h2>
            <p>If you have any questions or need assistance, feel free to reach out using the form below.</p>

            <form action="#" method="post">
                <label for="name">Your Name:</label>
                <input type="text" id="name" name="name" required>

                <label for="email">Your Email:</label>
                <input type="email" id="email" name="email" required>
                
                <label for="message">Message:</label>
                <textarea id="message" name="message" rows="5" required></textarea>

                <button type="submit">Send Message</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Sundhara Bus Ticket Booking Service | Email: support@sundharabusbooking.com | Phone: +91-9876543210</p>
    </footer>
</body>
</html>
